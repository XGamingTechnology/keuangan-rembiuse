version: "3.8"

services:
  # 🗄️ PostgreSQL Database (Containerized)
  db:
    image: postgres:16-alpine
    container_name: office_admin_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups # Mount folder untuk backup manual
    networks:
      - office_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔌 Backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: office_admin_backend
    restart: unless-stopped
    environment:
      # Connect ke DB container dalam network yang sama
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # Auth
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      # Server
      - NODE_ENV=production
      - PORT=${BACKEND_PORT}
      - CORS_ORIGIN=https://office.getopurtunity.online
    # ⚠️ Port backend TIDAK di-expose ke host! Semua via Caddy
    # ports:
    #   - "${BACKEND_PORT}:${BACKEND_PORT}"  # ← Comment out untuk production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - office_network
    command: sh -c "sleep 5 && node dist/main"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/api/office/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 🎨 Frontend React + Vite + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: office_admin_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=https://office.getopurtunity.online/api/office
    # ⚠️ Port frontend TIDAK di-expose ke host! Semua via Caddy
    # ports:
    #   - "3003:80"  # ← Comment out untuk production
    depends_on:
      - backend
    networks:
      - office_network

volumes:
  db_data: # Persistent volume untuk database

networks:
  office_network:
    driver: bridge
